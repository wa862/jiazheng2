spring.application.name=jiazheng-service

server.port=8082

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/jiazheng_service?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=20060128

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# 上传文件保存目录（相对项目根目录或绝对路径，如 D:/uploads）
upload.path=./uploads

logging.level.com.jiazheng=debug
